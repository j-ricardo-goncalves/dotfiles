# BACKGROUND
background {
    # Change this path to yours
    path = ~/Pictures/wallpaper2.png
    blur_passes = 3
    contrast = 1
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    hide_cursor = true
    ignore_empty_input = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 2
    dots_size = 0.4 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 234, 171, 0.8)
    inner_color = rgba(255, 234, 171, 0.5)
    font_family = JetBrainsMono Nerd Font Mono
    fade_on_empty = true
    rounding = 5
    check_color = rgb(204, 136, 34)
    fail_text = <span foreground="##ff0000">Wrong!</span>
    placeholder_text = <span foreground="##000004">Password please</span>
    hide_input = false
    position = 0, -520
    halign = center
    valign = center
}

# TIME
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M")"
  color = rgba(255, 234, 171, 0.8)
  font_size = 300
  font_family = deutschlander
  halign = center
  valign = center
}

